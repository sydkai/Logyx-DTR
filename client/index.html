<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="./icon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self';
               script-src 'self' 'unsafe-inline';
               style-src 'self' 'unsafe-inline';
               font-src 'self';
               img-src 'self' data: blob:;
               connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*;"
    />
    <title>Logyx Daily Time Record</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background: #0a0c10;
        color: #e8eaf0;
      }
    </style>
  </head>
  <body>
    <div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0a0c10;color:#00e5a0;font-family:Segoe UI,sans-serif;font-size:1rem">Loading Logyx DTR…</div></div>
    <script>
      window.onerror = function(msg, url, line, col, err) {
        var el = document.createElement('div');
        el.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#0a0c10;color:#ff6b35;padding:30px;font-family:monospace;font-size:13px;overflow:auto;white-space:pre-wrap;word-break:break-all';
        el.innerHTML = '<b>GLOBAL ERROR</b>\n' + msg + '\n' + url + ':' + line + ':' + col + '\n' + (err && err.stack ? err.stack : '');
        document.body.appendChild(el);
        document.body.style.background = '#0a0c10';
      };
      window.onunhandledrejection = function(e) {
        var el = document.createElement('div');
        el.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#0a0c10;color:#f59e0b;padding:30px;font-family:monospace;font-size:13px;overflow:auto;white-space:pre-wrap;word-break:break-all';
        el.innerHTML = '<b>UNHANDLED PROMISE REJECTION</b>\n' + (e.reason && e.reason.stack ? e.reason.stack : e.reason);
        document.body.appendChild(el);
        document.body.style.background = '#0a0c10';
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
